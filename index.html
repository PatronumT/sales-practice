<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>销售对练</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module"></script>
<style>
:root {
  --paper: #f7f2e8;
  --paper-2: #fbf7ef;
  --ink: #173b31;
  --ink-2: #31584b;
  --muted: #6c7a72;
  --soft: #e7eee5;
  --green: #245f4e;
  --green-deep: #0f352b;
  --green-mid: #397060;
  --green-light: #dfeee0;
  --line: rgba(44, 76, 65, 0.16);
  --gold: #b89554;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--paper);
  color: var(--ink);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ========== 通用组件 ========== */
.page { display: none; flex-direction: column; height: 100dvh; width: 100%; position: absolute; inset: 0; }
.page.active { display: flex; }

.topbar {
  height: 52px; min-height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  background: rgba(250, 247, 239, 0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
  z-index: 10; flex-shrink: 0;
}
.topbar-title { font-size: 17px; font-weight: 700; color: var(--ink); }
.topbar-btn {
  width: 36px; height: 36px; border-radius: 10px; border: none;
  background: transparent; color: var(--ink-2); font-size: 20px;
  display: grid; place-items: center; cursor: pointer;
}
.topbar-btn:active { background: var(--soft); }

.toast {
  position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
  background: var(--green-deep); color: #f0ebe0; padding: 10px 20px;
  border-radius: 10px; font-size: 14px; z-index: 999;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  max-width: 86vw; text-align: center;
}
.toast.show { opacity: 1; }

/* 对练结束大提示 */
.end-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(15, 53, 43, 0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; opacity: 0; transition: opacity 0.5s;
}
.end-overlay.show { display: flex; opacity: 1; }
.end-overlay-text {
  color: #f0ebe0; font-size: 22px; font-weight: 700;
  letter-spacing: 0.04em;
}
.end-overlay-sub {
  color: rgba(240, 235, 224, 0.6); font-size: 14px;
}
.end-overlay .loading-spinner {
  border-color: rgba(240, 235, 224, 0.2);
  border-top-color: #f0ebe0;
  width: 28px; height: 28px;
}

/* ========== 上传页 ========== */
#page-upload { background: var(--paper); }
.upload-scroll { flex: 1; overflow-y: auto; padding: 20px 16px 32px; }

.upload-hero {
  text-align: center; padding: 28px 0 24px;
}
.upload-hero h1 {
  font-size: 28px; font-weight: 800; letter-spacing: -0.03em;
  color: var(--ink); line-height: 1.15; margin-bottom: 8px;
}
.upload-hero p { font-size: 15px; color: var(--muted); line-height: 1.5; }

.upload-card {
  background: rgba(255,255,255,0.5);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px; margin-bottom: 16px;
}
.upload-card label {
  display: block; font-size: 14px; font-weight: 600;
  color: var(--ink-2); margin-bottom: 8px;
}
.upload-textarea {
  width: 100%; min-height: 200px; max-height: 50vh;
  border: 1px solid var(--line); border-radius: 10px;
  padding: 12px; font-size: 14px; line-height: 1.7;
  background: var(--paper-2); color: var(--ink);
  resize: vertical; font-family: inherit;
}
.upload-textarea::placeholder { color: #a0a99e; }
.upload-textarea:focus { outline: none; border-color: var(--green); }

.upload-or {
  text-align: center; color: var(--muted); font-size: 13px;
  margin: 12px 0; position: relative;
}
.upload-or::before, .upload-or::after {
  content: ""; position: absolute; top: 50%;
  width: 30%; height: 1px; background: var(--line);
}
.upload-or::before { left: 10%; }
.upload-or::after { right: 10%; }

.file-drop {
  border: 2px dashed rgba(44, 76, 65, 0.22); border-radius: var(--radius);
  padding: 28px 16px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.file-drop:active, .file-drop.dragover {
  border-color: var(--green); background: rgba(36, 95, 78, 0.06);
}
.file-drop-icon { font-size: 32px; margin-bottom: 6px; }
.file-drop-text { font-size: 14px; color: var(--muted); }
.file-drop-text strong { color: var(--green); }
.file-drop-hint { font-size: 12px; color: #a0a99e; margin-top: 4px; }
.file-name {
  margin-top: 8px; font-size: 13px; color: var(--green);
  font-weight: 600; display: none;
}
.file-name.show { display: block; }

#fileInput { display: none; }

.start-btn {
  width: 100%; height: 50px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #1c5748, #356f60);
  color: #f0ebe0; font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.02em; margin-top: 20px;
  transition: opacity 0.2s;
}
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.start-btn:active:not(:disabled) { opacity: 0.8; }

/* Loading overlay */
.loading-overlay {
  position: absolute; inset: 0; z-index: 20;
  background: rgba(247, 242, 232, 0.92);
  backdrop-filter: blur(8px);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.loading-overlay.show { display: flex; }
.loading-spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid var(--line); border-top-color: var(--green);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; color: var(--ink-2); font-weight: 500; text-align: center; }

/* ========== 对练页 ========== */
#page-practice { background: #ede8dd; }

.chat-area {
  flex: 1; overflow-y: auto; padding: 16px 12px;
  -webkit-overflow-scrolling: touch;
}
.chat-bubble-wrap { display: flex; margin-bottom: 12px; }
.chat-bubble-wrap.ai { justify-content: flex-start; }
.chat-bubble-wrap.user { justify-content: flex-end; }

.chat-avatar {
  width: 36px; height: 36px; border-radius: 6px;
  flex-shrink: 0; display: grid; place-items: center;
  font-size: 14px; font-weight: 700; color: #fff;
}
.chat-bubble-wrap.ai .chat-avatar { background: var(--green); margin-right: 8px; }
.chat-bubble-wrap.user .chat-avatar { background: var(--gold); margin-left: 8px; order: 2; }

.chat-bubble {
  max-width: 72%; padding: 10px 14px;
  font-size: 15px; line-height: 1.65;
  word-break: break-word;
}
.chat-bubble-wrap.ai .chat-bubble {
  background: #fff; color: var(--ink);
  border-radius: 2px 14px 14px 14px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.chat-bubble-wrap.user .chat-bubble {
  background: #a2d87c; color: #1a3016;
  border-radius: 14px 2px 14px 14px;
}

/* Typing indicator */
.typing-indicator { display: flex; gap: 4px; padding: 14px 18px; }
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #9aa69e; animation: typingBounce 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Chat input */
.chat-input-bar {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 8px 12px; padding-bottom: calc(8px + var(--safe-bottom));
  background: #f5f0e4;
  border-top: 1px solid rgba(44, 76, 65, 0.1);
  flex-shrink: 0;
}
.chat-input {
  flex: 1; min-height: 36px; max-height: 120px;
  border: 1px solid var(--line); border-radius: 18px;
  padding: 8px 14px; font-size: 15px; line-height: 1.5;
  background: #fff; color: var(--ink); resize: none;
  font-family: inherit;
}
.chat-input:focus { outline: none; border-color: var(--green); }
.chat-send-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: var(--green); color: #fff;
  font-size: 16px; cursor: pointer; flex-shrink: 0;
  display: grid; place-items: center;
}
.chat-send-btn:disabled { background: #b0bab3; cursor: not-allowed; }
.chat-send-btn:active:not(:disabled) { opacity: 0.8; }

/* ========== 总评页 ========== */
#page-report { background: var(--paper); }
.report-scroll { flex: 1; overflow-y: auto; padding: 20px 16px 32px; }
.report-content {
  background: rgba(255,255,255,0.45); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 20px 16px;
  font-size: 14px; line-height: 1.8; color: var(--ink);
}
.report-content h3 {
  font-size: 18px; font-weight: 700; color: var(--ink);
  margin: 24px 0 10px; padding-left: 14px;
  border-left: 4px solid var(--green);
}
.report-content h3:first-child { margin-top: 0; }
.report-content p { margin: 8px 0; }
.report-content table {
  width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px;
}
.report-content th {
  background: linear-gradient(90deg, #1c5748, #356f60);
  color: #f0ebe0; padding: 10px 12px; text-align: left; font-weight: 600;
}
.report-content td {
  padding: 10px 12px; border-bottom: 1px solid var(--line);
  vertical-align: top;
}
.report-content ul, .report-content ol { padding-left: 20px; margin: 8px 0; }
.report-content li { margin: 4px 0; }
.report-content strong { color: var(--green-deep); }
.report-content em { color: var(--muted); font-style: normal; }

.report-score {
  text-align: center; padding: 20px; margin: 16px 0;
  background: var(--soft); border-radius: var(--radius);
}
.report-score-num {
  font-size: 48px; font-weight: 800; color: var(--green);
  line-height: 1;
}
.report-score-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

.restart-btn {
  width: 100%; height: 48px; border: 2px solid var(--green);
  border-radius: 12px; background: transparent;
  color: var(--green); font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 20px;
}
.restart-btn:active { background: var(--soft); }

/* 对练页常驻评分按钮 */
.eval-float-btn {
  position: absolute; top: 58px; right: 12px; z-index: 8;
  padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid var(--green); background: rgba(250, 247, 239, 0.92);
  color: var(--green); font-size: 13px; font-weight: 600;
  cursor: pointer; backdrop-filter: blur(8px);
  display: none;
}
.eval-float-btn.show { display: block; }
.eval-float-btn:active { background: var(--soft); }

/* 结束选择弹窗 */
.end-choice {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(15, 53, 43, 0.65);
  backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
}
.end-choice.show { display: flex; }
.end-choice-box {
  background: var(--paper-2); border-radius: 16px;
  padding: 28px 24px; width: 300px; text-align: center;
}
.end-choice-title { font-size: 20px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
.end-choice-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
.end-choice-btns { display: flex; flex-direction: column; gap: 10px; }
.end-choice-btns button {
  height: 44px; border-radius: 10px; font-size: 15px;
  font-weight: 600; cursor: pointer; border: none;
}
.end-choice-eval { background: var(--green); color: #f0ebe0; }
.end-choice-stay { background: var(--soft); color: var(--ink-2); }

.download-btn {
  width: 100%; height: 48px;
  border: none; border-radius: 12px;
  background: linear-gradient(135deg, #1c5748, #356f60);
  color: #f0ebe0; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 12px;
}
.download-btn:active { opacity: 0.8; }

@media print {
  .topbar, .restart-btn, .download-btn, .toast, .end-overlay { display: none !important; }
  .page { position: static !important; height: auto !important; display: block !important; }
  .page:not(#page-report) { display: none !important; }
  #page-report { display: block !important; }
  .report-scroll { padding: 0; overflow: visible; }
  .report-content { border: none; background: none; box-shadow: none; padding: 0; }
  body { background: #fff; overflow: visible; }
}

/* 导出菜单 */
.export-menu {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15, 53, 43, 0.45);
  backdrop-filter: blur(4px);
  display: none; align-items: flex-end; justify-content: center;
}
.export-menu.show { display: flex; }
.export-sheet {
  width: 100%; max-width: 480px;
  background: var(--paper-2); border-radius: 16px 16px 0 0;
  padding: 20px 16px; padding-bottom: calc(16px + var(--safe-bottom));
}
.export-sheet-title {
  font-size: 16px; font-weight: 700; color: var(--ink);
  text-align: center; margin-bottom: 14px;
}
.export-item {
  width: 100%; height: 48px; border: none; border-radius: 10px;
  background: rgba(255,255,255,0.6); color: var(--ink);
  font-size: 15px; font-weight: 500; cursor: pointer;
  margin-bottom: 8px; text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.export-item:active { background: var(--soft); }
.export-item .export-tag {
  font-size: 11px; color: var(--muted); background: rgba(44,76,65,0.08);
  padding: 2px 8px; border-radius: 6px;
}
.export-cancel {
  width: 100%; height: 48px; border: none; border-radius: 10px;
  background: var(--soft); color: var(--muted);
  font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px;
}

/* 轻提示条 */
.practice-hint {
  padding: 10px 14px; margin: 0 12px 4px;
  background: rgba(36, 95, 78, 0.06);
  border-radius: 10px; font-size: 12px; line-height: 1.6;
  color: var(--muted); text-align: center;
}
</style>
</head>
<body>

<!-- ===== 上传页 ===== -->
<div id="page-upload" class="page active">
  <div class="topbar">
    <span class="topbar-title">销售对练</span>
    <span style="width:36px"></span>
  </div>
  <div class="upload-scroll">
    <div class="upload-hero">
      <h1>B2B 销售对练</h1>
      <p>上传销售对话文字稿，AI 萃取高光片段，开始角色扮演训练</p>
    </div>
    <div class="upload-card">
      <label>粘贴对话文字稿</label>
      <textarea id="transcriptInput" class="upload-textarea" placeholder="将销售对话文字稿粘贴到这里...&#10;&#10;支持任意格式的多人对话文本。"></textarea>
    </div>
    <div class="upload-or">或者上传文件</div>
    <div class="upload-card">
      <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()">
        <div class="file-drop-icon">📄</div>
        <div class="file-drop-text">点击选择文件或<strong>拖拽到此处</strong></div>
        <div class="file-drop-hint">支持 .txt / .docx / .pdf</div>
      </div>
      <input type="file" id="fileInput" accept=".txt,.docx,.pdf">
      <div class="file-name" id="fileName"></div>
    </div>
    <button class="start-btn" id="startBtn" onclick="startExtraction()">开始萃取</button>
  </div>
  <div class="loading-overlay" id="uploadLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="uploadLoadingText">AI 正在萃取高光片段...</div>
  </div>
</div>

<!-- ===== 对练页 ===== -->
<div id="page-practice" class="page">
  <div class="topbar">
    <button class="topbar-btn" onclick="confirmExit()" title="退出">✕</button>
    <span class="topbar-title" id="practiceTitle">对练中</span>
    <span style="width:36px"></span>
  </div>
  <button class="eval-float-btn" id="evalFloatBtn" onclick="manualEval()">进入评分 →</button>
  <div class="practice-hint" id="practiceHint">本轮提示：这是由真实销售录音生成的对练场景。请尝试识别客户真实顾虑，并把对话推进到明确下一步。</div>
  <div class="chat-area" id="chatArea"></div>
  <div class="chat-input-bar" id="chatInputBar">
    <textarea class="chat-input" id="chatInput" rows="1" placeholder="输入你的回应..." oninput="autoGrow(this)"></textarea>
    <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="loading-overlay" id="practiceLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">AI 正在生成总评报告...</div>
  </div>
</div>

<!-- ===== 总评页 ===== -->
<div id="page-report" class="page">
  <div class="topbar">
    <span></span>
    <span class="topbar-title">总评报告</span>
    <span style="width:36px"></span>
  </div>
  <div class="report-scroll">
    <div class="report-content" id="reportContent"></div>
    <button class="download-btn" onclick="openExportMenu()">导出</button>
    <button class="restart-btn" onclick="restart()">重新开始</button>
  </div>
</div>


<!-- ===== 结束选择弹窗 ===== -->
<div class="end-choice" id="endChoice">
  <div class="end-choice-box">
    <div class="end-choice-title">对练结束</div>
    <div class="end-choice-sub">AI 客户已完成所有关键对话节点</div>
    <div class="end-choice-btns">
      <button class="end-choice-eval" onclick="confirmEval()">进入评分</button>
      <button class="end-choice-stay" onclick="continueChat()">继续对话</button>
    </div>
  </div>
</div>

<!-- ===== 对练结束遮罩 ===== -->
<div class="end-overlay" id="endOverlay">
  <div class="end-overlay-text">对练结束</div>
  <div class="end-overlay-sub">正在生成总评报告...</div>
  <div class="loading-spinner"></div>
</div>

<!-- ===== 导出菜单 ===== -->
<div class="export-menu" id="exportMenu" onclick="closeExportMenu(event)">
  <div class="export-sheet" onclick="event.stopPropagation()">
    <div class="export-sheet-title">导出</div>
    <button class="export-item" onclick="exportReportImage()">评分报告 · 长图 <span class="export-tag">手机推荐</span></button>
    <button class="export-item" onclick="exportReportPDF()">评分报告 · PDF <span class="export-tag">电脑推荐</span></button>
    <button class="export-item" onclick="exportChatImage()">对话记录 · 长图 <span class="export-tag">手机推荐</span></button>
    <button class="export-item" onclick="exportChatPDF()">对话记录 · PDF <span class="export-tag">电脑推荐</span></button>
    <button class="export-item" onclick="exportChatJSON()">对话数据 · JSON <span class="export-tag">迭代用</span></button>
    <button class="export-cancel" onclick="closeExportMenu()">取消</button>
  </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   状态管理
   ================================================================ */
const AppState = {
  UPLOAD: 'upload',
  EXTRACTING: 'extracting',
  CONVERTING: 'converting',
  PRACTICE: 'practice',
  EVALUATING: 'evaluating',
  REPORT: 'report'
};

const app = {
  state: AppState.UPLOAD,
  apiKey: '',
  transcript: '',
  extractionResult: '',
  practiceConfig: null,
  practiceSystemPrompt: '',
  chatHistory: [],
  evaluationReport: ''
};

/* AES-256-GCM 加密的 API Key */
const _a = 'xK9$mQ2v';
const _b = 'Tn8@wL5j';
const _c = 'Rp3#bY7z';
const _d = 'IXQPlg4+/FYA3JsPtCA4VoTvPbvy+lWpSwT6YeqMhasx5mK7vbohDFzj4PvNRwAAzdHkivF0SEjq6YHyV9km';

async function _dk() {
  const p = _a + _b + _c;
  const e = new TextEncoder();
  const r = Uint8Array.from(atob(_d), c => c.charCodeAt(0));
  const iv = r.slice(0, 12);
  const ct = r.slice(12);
  const km = await crypto.subtle.importKey('raw', e.encode(p), 'PBKDF2', false, ['deriveKey']);
  const k = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: e.encode('frontend-key-salt-2026'), iterations: 100000, hash: 'SHA-256' },
    km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, k, ct);
  return new TextDecoder().decode(pt);
}

async function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['txt', 'docx', 'pdf'].includes(ext)) {
    showToast('不支持的文件格式，请上传 .txt / .docx / .pdf');
    return;
  }
  fileNameEl.textContent = '📎 ' + file.name;
  fileNameEl.classList.add('show');
  try {
    let text = '';
    if (ext === 'txt') {
      text = await file.text();
    } else if (ext === 'docx') {
      const buf = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: buf });
      text = result.value;
    } else if (ext === 'pdf') {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        text += tc.items.map(item => item.str).join('') + '\n';
      }
    }
    document.getElementById('transcriptInput').value = text;
    showToast('文件已解析');
  } catch (err) {
    showToast('文件解析失败：' + err.message);
  }
}

/* ================================================================
   API 调用 — 非流式（萃取、衔接用）
   ================================================================ */
async function callAI(messages, temperature = 0.7, model = 'deepseek-v4-pro', useThinking = true) {
  const payload = { model, messages, stream: false };
  if (useThinking) {
    payload.thinking = { type: 'enabled' };
    payload.reasoning_effort = 'high';
  } else {
    payload.thinking = { type: 'disabled' };
    payload.temperature = temperature;
  }
  const body = JSON.stringify(payload);
  const res = await apiFetch(body);
  if (!res.ok) {
    const errText = await res.text().catch(() => '');
    throw new Error('API 请求失败 (' + res.status + '): ' + (errText.slice(0, 100) || '未知错误'));
  }
  const data = await res.json();
  if (data.choices && data.choices[0]) return data.choices[0].message.content;
  if (data.content) return data.content;
  if (typeof data === 'string') return data;
  throw new Error('无法解析 API 返回格式');
}

/* ================================================================
   API 调用 — 流式（对练、总评用）
   onChunk(text) 每收到一段文字就回调
   返回完整文本
   ================================================================ */
async function callAIStream(messages, temperature, onChunk, model = 'deepseek-v4-pro', useThinking = false, effort = 'high') {
  const payload = { model, messages, stream: true };
  if (useThinking) {
    payload.thinking = { type: 'enabled' };
    payload.reasoning_effort = effort;
  } else {
    payload.thinking = { type: 'disabled' };
    payload.temperature = temperature;
  }
  const body = JSON.stringify(payload);
  const res = await apiFetch(body);
  if (!res.ok) {
    const errText = await res.text().catch(() => '');
    throw new Error('API 请求失败 (' + res.status + '): ' + (errText.slice(0, 100) || '未知错误'));
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let full = '';
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });

    const lines = buffer.split('\n');
    buffer = lines.pop() || '';

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || !trimmed.startsWith('data: ')) continue;
      const payload = trimmed.slice(6);
      if (payload === '[DONE]') continue;
      try {
        const json = JSON.parse(payload);
        const delta = json.choices?.[0]?.delta?.content || '';
        if (delta) {
          full += delta;
          onChunk(full);
        }
      } catch {}
    }
  }
  return full;
}

function apiFetch(body) {
  if (!app.apiKey) throw new Error('正在初始化，请稍后重试');
  return fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + app.apiKey },
    body
  });
}

  } catch (err) {
    setState(AppState.UPLOAD);

  // 构建对练 system prompt

  app.chatHistory = [];
  document.getElementById('chatArea').innerHTML = '';

  app.chatHistory.push({ role: 'assistant', content: opening });

  setState(AppState.PRACTICE);

    document.getElementById('evalFloatBtn').classList.add('show');

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || app.state !== AppState.PRACTICE) return;

  input.value = '';
  input.style.height = 'auto';
  addBubble('user', text);
  app.chatHistory.push({ role: 'user', content: text });

  document.getElementById('sendBtn').disabled = true;
  document.getElementById('chatInput').disabled = true;

  // 先显示 typing 动画
  showTyping();

  let bubbleEl = null;

  try {
    const messages = [
      { role: 'system', content: app.practiceSystemPrompt },
      ...app.chatHistory
    ];
    const reply = await callAIStream(messages, 0.8, (partial) => {
      if (!bubbleEl) {
        hideTyping();
        bubbleEl = addBubble('ai', '');
      }
      const clean = partial.replace(/\[PRACTICE_END\]/g, '').trim();
      bubbleEl.textContent = clean;
      scrollChat();
    }, 'deepseek-v4-pro', true, 'low');

    hideTyping();
    const cleanReply = reply.replace(/\[PRACTICE_END\]/g, '').trim();

    if (!cleanReply) {
      if (bubbleEl) bubbleEl.parentElement.remove();
      showToast('AI 返回为空，请重试');
    } else {
      if (bubbleEl) bubbleEl.textContent = cleanReply;
      app.chatHistory.push({ role: 'assistant', content: cleanReply });

      if (reply.includes('[PRACTICE_END]')) {
        await sleep(2000);
        document.getElementById('endChoice').classList.add('show');
        return;
      }
    }
  } catch (err) {
    hideTyping();
    if (bubbleEl) bubbleEl.parentElement.remove();
    showToast('AI 回复失败：' + (err.message || '网络错误，请重试'));
    console.error('sendMessage error:', err);
  } finally {
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('chatInput').disabled = false;
  }
}

async function _exportPDF(el, title, isChat) {
  closeExportMenu();
  showToast('正在生成 PDF...');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');
  const pageW = 190, marginX = 10, marginY = 10, pageMaxH = 277;
  let curY = marginY;

  // 构建离屏容器，将内容拆成独立块
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:0;top:0;width:800px;padding:0 24px;background:#f7f2e8;z-index:-1;';
  if (isChat) {
    wrap.innerHTML = '<div style="font-size:20px;font-weight:700;color:#173b31;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #245f4e">对话记录</div>' + el;
  } else {
    // 克隆报告内容
    const clone = el.cloneNode(true);
    wrap.appendChild(clone);
  }
  document.body.appendChild(wrap);

  // 收集所有直接子块
  const blocks = Array.from(wrap.children);
  if (blocks.length === 0) blocks.push(wrap);

  try {
    for (let i = 0; i < blocks.length; i++) {
      const block = blocks[i];
      const canvas = await html2canvas(block, {
        scale: 2, useCORS: true, backgroundColor: '#f7f2e8', windowWidth: 800
      });
      const imgW = pageW;
      const imgH = canvas.height * imgW / canvas.width;

      // 如果单个块超过一整页，回退到按像素切片
      if (imgH > pageMaxH) {
        const imgData = canvas.toDataURL('image/jpeg', 0.92);
        let sliceY = 0;
        while (sliceY < imgH) {
          if (curY > marginY) { pdf.addPage(); curY = marginY; }
          const remain = pageMaxH - curY;
          const drawH = Math.min(remain, imgH - sliceY);
          const srcY = sliceY * canvas.width / imgW;
          const srcH = drawH * canvas.width / imgW;
          const slice = document.createElement('canvas');
          slice.width = canvas.width;
          slice.height = Math.round(srcH);
          slice.getContext('2d').drawImage(canvas, 0, Math.round(srcY), canvas.width, Math.round(srcH), 0, 0, canvas.width, Math.round(srcH));
          pdf.addImage(slice.toDataURL('image/jpeg', 0.92), 'JPEG', marginX, curY, imgW, drawH);
          sliceY += drawH;
          curY = marginY + pageMaxH; // 强制下一次换页
        }
        curY = marginY;
        continue;
      }

      // 正常块：检查是否放得下当前页
      if (curY + imgH > pageMaxH + marginY) {
        pdf.addPage();
        curY = marginY;
      }
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', marginX, curY, imgW, imgH);
      curY += imgH + 2;
    }
    pdf.save('销售对练-' + title + '-' + new Date().toISOString().slice(0,10) + '.pdf');
    showToast('PDF 已保存');
  } catch(err) {
    showToast('生成失败：' + err.message);
  } finally {
    document.body.removeChild(wrap);
  }
}

# 五、客户反应机制

每次看到销售回复后，判断属于哪种情况，选一种反应：

- 说得太空 → 追问具体："你别讲这么大，具体怎么弄？"
- 讲太多专业词 → 要求翻译："你直接说跟我有啥关系"
- 给出数字 → 追问来源："这个数是怎么算的？你现在又没看我账"
- 说能降低风险 → 追问新风险："那这样弄，会不会以后查起来更麻烦？"
- 讲案例 → 判断相关性："这个案例跟我这种情况一样吗？"
- 讲得太多 → 表示听蒙："等一下，你说得有点多，我有点蒙"
- 承认不确定并提出验证 → 增加信任："嗯，这么说我能接受"

# 五点五、情绪回弹（极其重要）

你不是线性被说服的。你是一个被查过、被坑过、有心理阴影的老板。

核心规则：每当你开始认可销售的某个说法时，必须在认可之后附带一个新的质疑、旧伤回闪、或成本追问。你永远不能"一路顺下去"。

示例：
- "你这个思路我能理解，但是最后落到我头上是不是还是多交税？"
- "道理是这个道理，可你们做完就走了，后面出问题找谁？"
- "行，就算风险是真的，这几十万花下去到底值不值？"
- "你说得对，但我上次也是听了一个专家的，最后啥也没落地。"
- "嗯，这个我认，但你刚才那个数我还是觉得有问题。"

绝对不能出现这种情况：销售说了一个好观点 → 你直接"认可了" → 后面全程配合。
真实老板是：认可了 → 转头又怀疑 → 再认可一点 → 又开始算钱 → 反复拉扯。

# 五点六、客户防御机制

你天然会用以下方式保护自己，不需要销售触发，你自己就会用：

1. 最小化问题："也没那么严重吧，我们这么多年也没出过事。"
2. 转移行业共性："大家不都这样？餐饮行业哪家不是这么干的。"
3. 拖延："这个不急，我回头再看看。"
4. 价格防御："这玩意值几十万？我开一家店才赚多少。"
5. 对比同行："别人没搞这些也活得好好的。"
6. 怀疑动机："你是不是故意吓我，好让我签单？"
7. 内部甩锅："这个得看我们财务，我说了不算。"
8. 假推进："行，你把资料发我看看。"（实际上不打算推进）

每 3-4 轮对话，你至少要用一次防御机制。不要等销售犯错才防御——真实客户随时都在防御。

# 五点七、记仇规则

你会记住销售在对话中说过的所有具体数字、承诺和判断。如果后面销售的说法和前面矛盾，你必须追问：

- "你刚才不是说能到1.6%？怎么现在又变了？"
- "你之前说先不碰历史，现在又说要梳理，这前后不一样吧？"

你是被坑过的老板，你对前后不一致极其敏感。销售说过的话你全记着。
